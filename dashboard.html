<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аудиторія — дашборд</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #22222a;
    --border: rgba(255,255,255,0.07);
    --text: #f0ede8;
    --muted: #7a7880;
    --accent: #c8f060;
    --accent2: #7c6ff7;
    --pos: #4dba87;
    --neg: #e05a5a;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .title-block h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }

  .title-block p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    font-family: var(--mono);
  }

  #refreshBtn {
    background: var(--accent);
    color: #0f0f11;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #refreshBtn:hover { opacity: 0.85; }
  #refreshBtn:disabled { opacity: 0.4; cursor: default; }

  .period-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .period-tabs button {
    background: var(--surface);
    border: 0.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
  }

  .period-tabs button.active {
    background: var(--surface2);
    color: var(--text);
    border-color: rgba(255,255,255,0.15);
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }

  .metric-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .metric-card:hover { border-color: rgba(255,255,255,0.15); }

  .metric-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .metric-value {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .metric-delta {
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
  }

  .metric-delta.pos { color: var(--pos); }
  .metric-delta.neg { color: var(--neg); }
  .metric-delta.neutral { color: var(--muted); }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 2rem;
  }

  @media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .chart-card.full { grid-column: 1 / -1; }

  .chart-title {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }

  .chart-wrap { position: relative; width: 100%; }
  .chart-wrap.tall { height: 280px; }
  .chart-wrap.short { height: 200px; }

  .bar-list { display: flex; flex-direction: column; gap: 10px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .bar-name {
    width: 100px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
    text-align: right;
  }

  .bar-track {
    flex: 1;
    height: 18px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .bar-val {
    min-width: 55px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .status {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .dot-pulse {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .last-updated {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-align: right;
    margin-top: 1.5rem;
  }

  .accent-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1><span class="accent-dot"></span>Приріст аудиторії</h1>
    <p id="subtitle">завантаження даних...</p>
  </div>
  <button id="refreshBtn" onclick="loadData()">↻ Оновити</button>
</header>

<div class="period-tabs" id="periodTabs"></div>

<div id="root"><div class="status"><span class="dot-pulse"></span>Завантажую дані з Google Sheets...</div></div>

<div class="last-updated" id="lastUpdated"></div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcsRsrdGPa3RCRmhHWM8oadnlnpuvs0vg2ZTJjXwicdqxGzncZEQ7jPvBs61_n1dAt1yLlQKCzlcSH/pub?output=csv';
const CSV_URL = 'https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV);

const CHANNELS = [
  { key: 0, label: 'Смартсендер', color: '#7c6ff7' },
  { key: 1, label: 'Сендпульс',   color: '#4dba87' },
  { key: 2, label: 'ТГ Журнал',   color: '#5ba3e0' },
  { key: 3, label: 'ТГ Щоденник', color: '#e0a84d' },
  { key: 4, label: 'ТТ основа',   color: '#d45fa0' },
  { key: 5, label: 'ТТ лайф',     color: '#888' },
  { key: 6, label: 'Ютуб',         color: '#e05a5a' },
  { key: 7, label: 'Інстаграм',   color: '#c8f060' },
];

const PERIODS = [
  { label: '1 міс', n: 4 },
  { label: '3 міс', n: 9 },
  { label: 'Все',   n: 999 },
];

let allData = [];
let activePeriod = 2;
let charts = {};

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
    if (!cols[0]) continue;
    // skip delta rows (rows where date column is empty or same as previous absolute row)
    const date = cols[0];
    const vals = cols.slice(1, 9).map(v => parseFloat(v.replace(/\s/g, '').replace(',', '.')) || 0);
    // only keep rows where first numeric value looks like an absolute (>100 for most channels)
    if (vals[0] > 100 || vals[2] > 100) {
      rows.push({ date, vals });
    }
  }
  return rows;
}

function fmt(n) {
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + 'k';
  return Math.round(n).toLocaleString('uk');
}

function deltaClass(d) {
  if (d > 0) return 'pos';
  if (d < 0) return 'neg';
  return 'neutral';
}

function deltaStr(d) {
  return (d >= 0 ? '+' : '') + fmt(d);
}

function getSlice() {
  const n = PERIODS[activePeriod].n;
  return allData.slice(-Math.min(n, allData.length));
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

function render() {
  destroyCharts();
  const slice = getSlice();
  if (!slice.length) return;
  const first = slice[0], last = slice[slice.length - 1];

  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="metrics" id="metrics"></div>
    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-title">Динаміка підписників</div>
        <div class="chart-wrap tall"><canvas id="lineChart"></canvas></div>
        <div class="legend" id="lineLegend"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Приріст за період</div>
        <div class="bar-list" id="barList"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">% приросту</div>
        <div class="chart-wrap short"><canvas id="pctChart"></canvas></div>
      </div>
    </div>
  `;

  // Metrics
  const metricsEl = document.getElementById('metrics');
  metricsEl.innerHTML = CHANNELS.map((ch, i) => {
    const cur = last.vals[ch.key];
    const prev = first.vals[ch.key];
    const delta = cur - prev;
    return `<div class="metric-card">
      <div class="metric-label">${ch.label}</div>
      <div class="metric-value">${fmt(cur)}</div>
      <div class="metric-delta ${deltaClass(delta)}">${deltaStr(delta)}</div>
    </div>`;
  }).join('');

  // Line chart
  const labels = slice.map(r => r.date.slice(0, 5));
  const igIdx = CHANNELS.findIndex(c => c.label === 'Інстаграм');
  const lineChannels = CHANNELS.filter((_, i) => i !== igIdx);

  charts.line = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels,
      datasets: lineChannels.map(ch => ({
        label: ch.label,
        data: slice.map(r => r.vals[ch.key]),
        borderColor: ch.color,
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        pointRadius: 2,
        pointHoverRadius: 4,
        tension: 0.3,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#22222a',
        borderColor: 'rgba(255,255,255,0.08)',
        borderWidth: 1,
        titleColor: '#f0ede8',
        bodyColor: '#7a7880',
        titleFont: { family: 'DM Mono', size: 11 },
        bodyFont: { family: 'DM Mono', size: 11 },
      }},
      scales: {
        x: { ticks: { color: '#7a7880', font: { size: 10, family: 'DM Mono' }, maxRotation: 45, autoSkip: true }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#7a7880', font: { size: 10, family: 'DM Mono' }, callback: v => fmt(v) }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });

  // Legend
  document.getElementById('lineLegend').innerHTML = lineChannels.map(ch =>
    `<span class="legend-item"><span class="legend-dot" style="background:${ch.color}"></span>${ch.label}</span>`
  ).join('');

  // Bar list
  const deltas = CHANNELS.map(ch => ({ ...ch, delta: last.vals[ch.key] - first.vals[ch.key] }))
    .sort((a, b) => b.delta - a.delta);
  const maxAbs = Math.max(...deltas.map(d => Math.abs(d.delta)), 1);

  document.getElementById('barList').innerHTML = deltas.map(ch => {
    const pct = Math.round(Math.abs(ch.delta) / maxAbs * 100);
    const color = ch.delta >= 0 ? ch.color : '#e05a5a';
    return `<div class="bar-row">
      <span class="bar-name">${ch.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};opacity:0.9;"></div></div>
      <span class="bar-val" style="color:${color}">${deltaStr(ch.delta)}</span>
    </div>`;
  }).join('');

  // % growth chart
  const pctData = CHANNELS.map(ch => {
    const prev = first.vals[ch.key];
    const cur = last.vals[ch.key];
    return prev > 0 ? Math.round((cur - prev) / prev * 1000) / 10 : 0;
  });

  charts.pct = new Chart(document.getElementById('pctChart'), {
    type: 'bar',
    data: {
      labels: CHANNELS.map(c => c.label),
      datasets: [{
        data: pctData,
        backgroundColor: pctData.map((v, i) => v >= 0 ? CHANNELS[i].color : '#e05a5a'),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#22222a',
        borderColor: 'rgba(255,255,255,0.08)',
        borderWidth: 1,
        titleColor: '#f0ede8',
        bodyColor: '#7a7880',
        titleFont: { family: 'DM Mono', size: 11 },
        bodyFont: { family: 'DM Mono', size: 11 },
        callbacks: { label: ctx => ' ' + ctx.raw.toFixed(1) + '%' }
      }},
      scales: {
        x: { ticks: { color: '#7a7880', font: { size: 9, family: 'DM Mono' }, maxRotation: 40 }, grid: { display: false } },
        y: { ticks: { color: '#7a7880', font: { size: 10, family: 'DM Mono' }, callback: v => v + '%' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function renderPeriodTabs() {
  document.getElementById('periodTabs').innerHTML = PERIODS.map((p, i) =>
    `<button class="${i === activePeriod ? 'active' : ''}" onclick="setPeriod(${i})">${p.label}</button>`
  ).join('');
}

function setPeriod(i) {
  activePeriod = i;
  renderPeriodTabs();
  render();
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '↻ Завантажую...';

  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    allData = parseCSV(text);

    if (!allData.length) throw new Error('Немає даних');

    const last = allData[allData.length - 1];
    document.getElementById('subtitle').textContent = `останні дані: ${last.date}`;
    document.getElementById('lastUpdated').textContent = 'оновлено: ' + new Date().toLocaleString('uk');
    renderPeriodTabs();
    render();
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="status">⚠ Не вдалося завантажити дані.<br>Перевір що таблиця опублікована (Файл → Опублікувати в інтернеті).</div>`;
  }

  btn.disabled = false;
  btn.textContent = '↻ Оновити';
}

loadData();
</script>
</body>
</html>
