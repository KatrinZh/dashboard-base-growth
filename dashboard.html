<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 Авдиторія — дашборд</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f0f11;--surface:#18181c;--surface2:#22222a;
  --border:rgba(255,255,255,0.07);--text:#f0ede8;--muted:#7a7880;
  --accent:#c8f060;--pos:#4dba87;--neg:#e05a5a;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body { background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:2rem 1.5rem; }
header { display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem; }
.title-block h1 { font-size:22px;font-weight:500; }
.title-block p { font-size:13px;color:var(--muted);margin-top:3px;font-family:var(--mono); }
.header-btns { display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
button.btn { background:transparent;color:var(--text);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 16px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s; }
button.btn:hover { background:var(--surface2); }
.sync-status { font-size:11px;font-family:var(--mono);color:var(--muted); }
.sync-status.ok { color:var(--pos); }
.sync-status.err { color:var(--neg); }
.period-tabs { display:flex;gap:6px;margin-bottom:1.5rem; }
.period-tabs button { background:var(--surface);border:0.5px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 16px;font-size:12px;font-family:var(--mono);cursor:pointer;transition:all 0.15s; }
.period-tabs button.active { background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,0.15); }
.metrics { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:2rem; }
.metric-card { background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px; }
.metric-label { font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px; }
.metric-label a { color:var(--muted);text-decoration:none;border-bottom:0.5px solid rgba(255,255,255,0.15);transition:color 0.15s; }
.metric-label a:hover { color:var(--accent); }
.metric-value { font-size:22px;font-weight:500;letter-spacing:-0.5px;line-height:1;margin-bottom:4px; }
.metric-delta { font-size:12px;font-family:var(--mono);font-weight:500; }
.metric-delta.pos{color:var(--pos)}.metric-delta.neg{color:var(--neg)}.metric-delta.neutral{color:var(--muted)}
.charts-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem; }
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
.chart-card { background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px; }
.chart-card.full { grid-column:1/-1; }
.chart-title { font-size:12px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px; }
.chart-wrap { position:relative;width:100%; }
.chart-wrap.tall{height:280px}.chart-wrap.short{height:200px}
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-name{width:100px;color:var(--muted);font-family:var(--mono);font-size:11px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{min-width:55px;font-family:var(--mono);font-size:11px;font-weight:500}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.accent-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
.table-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:2rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono);min-width:600px}
th{color:var(--muted);font-weight:400;text-align:right;padding:6px 10px;border-bottom:0.5px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.4px}
th:first-child{text-align:left}
td{text-align:right;padding:8px 10px;border-bottom:0.5px solid rgba(255,255,255,0.04);color:var(--text)}
td:first-child{text-align:left;color:var(--muted)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>📈 Приріст авдиторії</h1>
    <p id="subtitle">завантаження...</p>
  </div>
  <div class="header-btns">
    <span class="sync-status" id="syncStatus"></span>
    <button class="btn" onclick="toggleTable()">📋 Всі дані</button>
    <button class="btn" onclick="loadCSV()">↻ Оновити</button>
  </div>
</header>

<div class="period-tabs" id="periodTabs"></div>
<div class="metrics" id="metrics"></div>
<div class="charts-grid" id="chartsGrid"></div>
<div id="tableSection" style="display:none"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcsRsrdGPa3RCRmhHWM8oadnlnpuvs0vg2ZTJjXwicdqxGzncZEQ7jPvBs61_n1dAt1yLlQKCzlcSH/pub?output=csv';

const CHANNELS = [
  {key:'smart',label:'Смартсендер',color:'#7c6ff7',url:null},
  {key:'send', label:'Сендпульс',  color:'#4dba87',url:null},
  {key:'tgj',  label:'ТГ Журнал',  color:'#5ba3e0',url:null},
  {key:'tgsh', label:'ТГ Щоденник',color:'#e0a84d',url:null},
  {key:'tto',  label:'ТТ основа',  color:'#d45fa0',url:'https://www.tiktok.com/@plitkarka_online'},
  {key:'ttl',  label:'ТТ лайф',    color:'#888',   url:'https://www.tiktok.com/@plitkarka_life'},
  {key:'yt',   label:'Ютуб',       color:'#e05a5a',url:'https://www.youtube.com/@kateryna_borysenko'},
  {key:'ig',   label:'Інстаграм',  color:'#c8f060',url:'https://www.instagram.com/kateryna_borysenko/'},
];

const PERIODS = [{label:'1 міс',n:4},{label:'3 міс',n:9},{label:'Все',n:999}];
let activePeriod = 2;
let charts = {};
let allData = [];
let showTable = false;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const raw = lines[i];
    const cols = raw.split(',').map(function(c){ return c.trim().replace(/"/g,''); });
    const dateVal = cols[0];
    if (!dateVal || dateVal === '-' || dateVal === '') continue;
    const nums = [];
    for (let j = 1; j <= 8; j++) {
      const v = (cols[j] || '').replace(/\s/g,'').replace(',','.');
      nums.push(parseFloat(v) || 0);
    }
    if (nums[0] < 100 && nums[2] < 100) continue;
    rows.push({date:dateVal,smart:nums[0],send:nums[1],tgj:nums[2],tgsh:nums[3],tto:nums[4],ttl:nums[5],yt:nums[6],ig:nums[7]});
  }
  return rows;
}

async function loadCSV() {
  const status = document.getElementById('syncStatus');
  status.textContent = '↻ завантажую...';
  status.className = 'sync-status';
  try {
    const res = await fetch(CSV_URL + '&cachebust=' + Date.now(), {cache: 'no-store'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);
    if (parsed.length < 3) throw new Error('мало рядків');
    allData = parsed;
    const last = allData[allData.length-1];
    status.textContent = '✓ оновлено · ' + last.date;
    status.className = 'sync-status ok';
    renderTabs();
    render();
    if (showTable) renderTable();
  } catch(e) {
    status.textContent = '⚠ не вдалось завантажити';
    status.className = 'sync-status err';
    console.log('CSV error:', e.message);
  }
}

function fmt(n){return Math.abs(n)>=1000?(n/1000).toFixed(1)+'k':Math.round(n).toLocaleString('uk')}
function dc(d){return d>0?'pos':d<0?'neg':'neutral'}
function ds(d){return(d>=0?'+':'')+fmt(d)}
function getSlice(){const n=PERIODS[activePeriod].n;return allData.slice(-Math.min(n,allData.length))}

function chLabel(ch){
  return ch.url
    ? '<a href="'+ch.url+'" target="_blank" rel="noopener">'+ch.label+'</a>'
    : ch.label;
}

function destroyCharts(){Object.values(charts).forEach(function(c){try{c.destroy()}catch(e){}});charts={}}

function render(){
  destroyCharts();
  const slice = getSlice();
  if (!slice.length) return;
  const first = slice[0], last = slice[slice.length-1];
  document.getElementById('subtitle').textContent = first.date + ' → ' + last.date;

  document.getElementById('metrics').innerHTML = CHANNELS.map(function(ch){
    const cur=last[ch.key]||0, prev=first[ch.key]||0, delta=cur-prev;
    return '<div class="metric-card"><div class="metric-label">'+chLabel(ch)+'</div><div class="metric-value">'+fmt(cur)+'</div><div class="metric-delta '+dc(delta)+'">'+ds(delta)+'</div></div>';
  }).join('');

  document.getElementById('chartsGrid').innerHTML =
    '<div class="chart-card full"><div class="chart-title">Динаміка підписників</div><div class="chart-wrap tall"><canvas id="lineChart"></canvas></div><div class="legend" id="lineLegend"></div></div>'+
    '<div class="chart-card"><div class="chart-title">Приріст за період</div><div class="bar-list" id="barList"></div></div>'+
    '<div class="chart-card"><div class="chart-title">% приросту</div><div class="chart-wrap short"><canvas id="pctChart"></canvas></div></div>';

  const labels = slice.map(function(r){return r.date.slice(0,5)});
  const lch = CHANNELS.filter(function(c){return c.key!=='ig'});

  charts.line = new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels:labels,datasets:lch.map(function(ch){return{label:ch.label,data:slice.map(function(r){return r[ch.key]||0}),borderColor:ch.color,backgroundColor:'transparent',borderWidth:1.5,pointRadius:2,tension:0.3}})},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#22222a',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,titleColor:'#f0ede8',bodyColor:'#7a7880',titleFont:{family:'DM Mono',size:11},bodyFont:{family:'DM Mono',size:11}}},scales:{x:{ticks:{color:'#7a7880',font:{size:10,family:'DM Mono'},maxRotation:45,autoSkip:true},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#7a7880',font:{size:10,family:'DM Mono'},callback:function(v){return fmt(v)}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });

  document.getElementById('lineLegend').innerHTML = lch.map(function(ch){
    return '<span class="legend-item"><span class="legend-dot" style="background:'+ch.color+'"></span>'+ch.label+'</span>';
  }).join('');

  const deltas = CHANNELS.map(function(ch){return Object.assign({},ch,{delta:(last[ch.key]||0)-(first[ch.key]||0)})}).sort(function(a,b){return b.delta-a.delta});
  const maxAbs = Math.max.apply(null,deltas.map(function(d){return Math.abs(d.delta)}).concat([1]));
  document.getElementById('barList').innerHTML = deltas.map(function(ch){
    const pct=Math.round(Math.abs(ch.delta)/maxAbs*100);
    const color=ch.delta>=0?ch.color:'#e05a5a';
    return '<div class="bar-row"><span class="bar-name">'+ch.label+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+';opacity:0.9;"></div></div><span class="bar-val" style="color:'+color+'">'+ds(ch.delta)+'</span></div>';
  }).join('');

  const pctData = CHANNELS.map(function(ch){
    const p=first[ch.key]||0, c=last[ch.key]||0;
    return p>0?Math.round((c-p)/p*1000)/10:0;
  });
  charts.pct = new Chart(document.getElementById('pctChart'),{
    type:'bar',
    data:{labels:CHANNELS.map(function(c){return c.label}),datasets:[{data:pctData,backgroundColor:pctData.map(function(v,i){return v>=0?CHANNELS[i].color:'#e05a5a'}),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#22222a',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,titleColor:'#f0ede8',bodyColor:'#7a7880',titleFont:{family:'DM Mono',size:11},bodyFont:{family:'DM Mono',size:11},callbacks:{label:function(ctx){return ' '+ctx.raw.toFixed(1)+'%'}}}},scales:{x:{ticks:{color:'#7a7880',font:{size:9,family:'DM Mono'},maxRotation:40},grid:{display:false}},y:{ticks:{color:'#7a7880',font:{size:10,family:'DM Mono'},callback:function(v){return v+'%'}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

function renderTable(){
  const sec = document.getElementById('tableSection');
  const rows = allData.slice().reverse().map(function(row){
    return '<tr><td>'+row.date+'</td>'+CHANNELS.map(function(ch){return '<td>'+(row[ch.key]||0).toLocaleString('uk')+'</td>'}).join('')+'</tr>';
  }).join('');
  sec.innerHTML = '<div class="table-card"><div class="chart-title" style="margin-bottom:14px">Всі записи ('+allData.length+')</div><table><thead><tr><th>Дата</th>'+CHANNELS.map(function(c){return '<th>'+c.label+'</th>'}).join('')+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function toggleTable(){
  showTable = !showTable;
  document.getElementById('tableSection').style.display = showTable ? 'block' : 'none';
  if (showTable) renderTable();
}

function renderTabs(){
  document.getElementById('periodTabs').innerHTML = PERIODS.map(function(p,i){
    return '<button class="'+(i===activePeriod?'active':'')+'" onclick="setPeriod('+i+')">'+p.label+'</button>';
  }).join('');
}

function setPeriod(i){activePeriod=i;renderTabs();render()}

renderTabs();
loadCSV();
</script>
</body>
</html>
